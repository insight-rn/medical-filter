<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Logic Verification Test Runner</title>
    <style>
        body { font-family: monospace; background: #1e293b; color: #f1f5f9; padding: 2rem; }
        .success { color: #4ade80; }
        .error { color: #f87171; border: 1px solid #f87171; padding: 0.5rem; margin-top: 0.5rem; }
        .info { color: #60a5fa; }
    </style>
</head>
<body>
    <h1>Logic Verification: Exhaustive Tree Search</h1>
    <div id="output">Running...</div>

    <script>
        const output = document.getElementById('output');
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.innerText = msg;
            output.appendChild(div);
        }

        // Mock state
        let appMode = 'bone';
        let answers = {};
        const formatD = (d) => `${d.getFullYear()}년 ${String(d.getMonth() + 1).padStart(2, '0')}월 ${String(d.getDate()).padStart(2, '0')}일`;
        
        // Helper functions
        function branchByProliaType() {
            if (answers.proliaType === 'general') return "prolia_frac_1";
            return autoEvalSteroidScore();
        }
        function autoEvalNormalScores() {
            const score = answers.proliaQ2;
            if (score <= -2.5) return "prolia_res_C";
            if (score > -2.5 && score <= -2.0) return "prolia_q8_1"; 
            return "prolia_res_E";
        }
        function autoEvalSteroidScore() {
            const score = answers.proliaQ2;
            if (answers.giopAge === 'adult') {
                if (score <= -1.5) return "prolia_res_B";
                return "prolia_res_E";
            } else {
                if (score <= -2.0) return "prolia_res_B";
                return "prolia_res_E";
            }
        }
        function routeDiagnosis() {
            if (answers.ageGroup === 'senior') return "result_diag_eligible";
            if (answers.ageGroup === 'teen') return "teen_disease";
            if (answers.gender === 'F' && answers.ageGroup === 'adult') return "f_preg_diag";
            return "m_frac";
        }
        function checkFollowUpRouting() {
            if (answers.ageGroup === 'teen') return "teen_zscore";
            if (answers.gender === 'F' && answers.ageGroup === 'adult') return "f_fu_preg";
            return "fu_tscore";
        }

        // The Logic Tree (Must be kept in sync with script.js)
        const logicTree = {
            root: { options: [
                { action: () => { appMode = 'bone'; return 'start'; } },
                { action: () => { appMode = 'prolia'; return 'prolia_q1_purpose'; } }
            ] },
            prolia_q1_purpose: { options: [
                { action: () => { answers.proliaType = 'general'; return "prolia_q2_date"; } },
                { action: () => { answers.proliaType = 'giop'; return "prolia_steroid_chk"; } }
            ] },
            prolia_steroid_chk: { type: "checkboxes_steroid", action: (is90, is450) => (is90 && is450) ? "prolia_q1_giop_type" : "prolia_res_E_steroid_cond" },
            prolia_q1_giop_type: { options: [
                { action: () => { answers.giopAge = 'adult'; return "prolia_q2_date"; } },
                { action: () => { answers.giopAge = 'young'; return "prolia_q2_date"; } }
            ] },
            prolia_q2_date: { type: "date", action: (val) => {
                const bmdDate = new Date(val);
                const today = new Date();
                const diffDays = (today - bmdDate) / (1000 * 60 * 60 * 24);
                if (diffDays > 365.25) return "prolia_res_E_date_expired";
                return (answers.proliaType === 'giop' && answers.giopAge === 'young') ? "prolia_q3_score_z" : "prolia_q3_score_t";
            } },
            prolia_q3_score_t: { type: "number", action: (val) => { answers.proliaQ2 = parseFloat(val); return "prolia_q4_has_history"; } },
            prolia_q3_score_z: { type: "number", action: (val) => { answers.proliaQ2 = parseFloat(val); return "prolia_q4_has_history"; } },
            prolia_q4_has_history: { options: [
                { action: () => "prolia_q4_date" },
                { action: () => { answers.proliaQ3 = null; return branchByProliaType(); } }
            ] },
            prolia_q4_date: { type: "date", action: (val) => { answers.proliaQ3 = val; return branchByProliaType(); } },
            prolia_frac_1: { options: [
                { action: () => "prolia_frac_2" },
                { action: () => autoEvalNormalScores() }
            ] },
            prolia_frac_2: { options: [
                { action: () => "prolia_res_A" },
                { action: () => autoEvalNormalScores() }
            ] },
            prolia_q8_1: { options: [
                { action: () => "prolia_q8_2" },
                { action: () => "prolia_res_E_new_patient" }
            ] },
            prolia_q8_2: { options: [
                { action: () => "prolia_q11" },
                { action: () => "prolia_res_E_start_invalid" }
            ] },
            prolia_q11: { options: [
                { action: () => { answers.proliaCount = 0; return "prolia_res_D"; } },
                { action: () => { answers.proliaCount = 1; return "prolia_res_D"; } },
                { action: () => { answers.proliaCount = 2; return "prolia_res_D"; } },
                { action: () => { answers.proliaCount = 3; return "prolia_res_D"; } },
                { action: () => { answers.proliaCount = 4; return "prolia_res_E_limit"; } }
            ] },
            prolia_res_A: { isResult: true }, prolia_res_B: { isResult: true }, prolia_res_C: { isResult: true }, 
            prolia_res_D: { isResult: true }, prolia_res_E: { isResult: true }, prolia_res_E_new_patient: { isResult: true }, 
            prolia_res_E_start_invalid: { isResult: true }, prolia_res_E_steroid_cond: { isResult: true }, 
            prolia_res_E_limit: { isResult: true }, prolia_res_E_date_expired: { isResult: true },
            start: { options: [ { action: () => { answers.gender = 'F'; return "age_f"; } }, { action: () => { answers.gender = 'M'; return "age_m"; } } ] },
            age_f: { options: [ 
                { action: () => { answers.ageGroup = 'senior'; return "purpose"; } }, 
                { action: () => { answers.ageGroup = 'adult'; return "purpose"; } }, 
                { action: () => { answers.ageGroup = 'teen'; return "purpose"; } }, 
                { action: () => "result_not_eligible_age" } ] },
            age_m: { options: [ 
                { action: () => { answers.ageGroup = 'senior'; return "purpose"; } }, 
                { action: () => { answers.ageGroup = 'adult'; return "purpose"; } }, 
                { action: () => { answers.ageGroup = 'teen'; return "purpose"; } }, 
                { action: () => "result_not_eligible_age" } ] },
            purpose: { options: [ { action: () => routeDiagnosis() }, { action: () => "fu_date" } ] },
            f_preg_diag: { options: [ { action: () => "result_diag_eligible" }, { action: () => "f_meno" } ] },
            f_meno: { options: [ { action: () => "f_bmi" }, { action: () => "f_amen" } ] },
            f_bmi: { options: [ { action: () => "result_diag_eligible" }, { action: () => "f_frac" } ] },
            f_frac: { options: [ { action: () => "result_diag_eligible" }, { action: () => "f_fam" } ] },
            f_fam: { options: [ { action: () => "result_diag_eligible" }, { action: () => "f_surg" } ] },
            f_surg: { options: [ { action: () => "result_diag_eligible" }, { action: () => "f_early" } ] },
            f_early: { options: [ { action: () => "result_diag_eligible" }, { action: () => "common_disease" } ] },
            f_amen: { options: [ { action: () => "result_diag_eligible" }, { action: () => "f_frac_pre" } ] },
            f_frac_pre: { options: [ { action: () => "result_diag_eligible" }, { action: () => "common_disease" } ] },
            m_frac: { options: [ { action: () => "result_diag_eligible" }, { action: () => "common_disease" } ] },
            common_disease: { options: [ { action: () => "result_diag_eligible" }, { action: () => "common_drug" } ] },
            common_drug: { options: [ { action: () => "result_diag_eligible" }, { action: () => "common_must" } ] },
            common_must: { options: [ { action: () => "result_diag_eligible" }, { action: () => "result_not_eligible" } ] },
            teen_disease: { options: [ { action: () => "result_diag_teen" }, { action: () => "teen_drug" } ] },
            teen_drug: { options: [ { action: () => "result_diag_teen" }, { action: () => "teen_must" } ] },
            teen_must: { options: [ { action: () => "result_diag_teen" }, { action: () => "result_not_eligible" } ] },
            fu_date: { type: "date", action: (val) => { answers.lastDate = val; return checkFollowUpRouting(); } },
            f_fu_preg: { options: [ { action: () => { answers.intervalCode = 'preg'; return "result_fu_calc"; } }, { action: () => "fu_tscore" } ] },
            fu_tscore: { options: [ 
                { action: () => { answers.tscore = 'normal'; return "fu_steroid"; } }, 
                { action: () => { answers.intervalCode = 'other'; return "result_fu_calc"; } }, 
                { action: () => { answers.tscore = 'severe'; return "fu_steroid"; } } 
            ] },
            fu_steroid: { options: [ { action: () => { answers.exception = true; return "result_fu_calc"; } }, { action: () => "fu_pth" } ] },
            fu_pth: { options: [ { action: () => { answers.exception = true; return "result_fu_calc"; } }, { action: () => { answers.exception = false; return "result_fu_calc"; } } ] },
            teen_zscore: { options: [ { action: () => { answers.intervalCode = 'teen_high'; return "result_fu_calc"; } }, { action: () => { answers.intervalCode = 'teen_low'; return "result_fu_calc"; } } ] },
            result_not_eligible_age: { isResult: true }, result_not_eligible: { isResult: true }, 
            result_diag_eligible: { isResult: true }, result_diag_teen: { isResult: true }, result_fu_calc: { isResult: true }
        };

        const pathsCount = { total: 0, successful: 0, failed: 0 };
        const errors = [];

        function traverse(nodeId, path = []) {
            const node = logicTree[nodeId];
            if (!node) {
                errors.push(`Error: Node "${nodeId}" not found. Path: ${path.join(" -> ")}`);
                pathsCount.failed++;
                return;
            }
            if (node.isResult) {
                pathsCount.successful++;
                pathsCount.total++;
                return;
            }
            const currentPath = [...path, nodeId];
            if (node.options) {
                node.options.forEach(opt => {
                    const savedAnswers = JSON.parse(JSON.stringify(answers));
                    const savedMode = appMode;
                    traverse(opt.action(), currentPath);
                    answers = savedAnswers;
                    appMode = savedMode;
                });
            } else if (node.type === "date") {
                [new Date().toISOString().split('T')[0], "2020-01-01"].forEach(d => {
                    const savedAnswers = JSON.parse(JSON.stringify(answers));
                    traverse(node.action(d), currentPath);
                    answers = savedAnswers;
                });
            } else if (node.type === "number") {
                [-3.0, -2.5, -2.4, -2.0, -1.9, -1.0, 0].forEach(s => {
                    const savedAnswers = JSON.parse(JSON.stringify(answers));
                    traverse(node.action(s), currentPath);
                    answers = savedAnswers;
                });
            } else if (node.type === "checkboxes_steroid") {
                [[false, false], [true, false], [false, true], [true, true]].forEach(([is90, is450]) => {
                    const savedAnswers = JSON.parse(JSON.stringify(answers));
                    traverse(node.action(is90, is450), currentPath);
                    answers = savedAnswers;
                });
            }
        }

        setTimeout(() => {
            log("Starting Exhaustive Decision Tree Test...");
            traverse("root");
            log("\n--- Test Results ---");
            log(`Total Paths Traversed: ${pathsCount.total}`);
            log(`Successful Terminations: ${pathsCount.successful}`);
            log(`Failed Terminations: ${pathsCount.failed}`);

            if (errors.length > 0) {
                log("\n--- Errors Found ---", 'error');
                errors.forEach(err => log(err, 'error'));
            } else {
                log("\n✅ All paths terminated correctly.", 'success');
            }
        }, 100);
    </script>
</body>
</html>
