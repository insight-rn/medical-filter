<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FILTER</title>
  <link rel="preconnect" href="https://rsms.me/">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <header class="app-header fade-in">
      <h1 id="main-title">FILTER</h1>
      <h2 id="app-subtitle" class="hidden"></h2>
      <p id="main-desc">30초 필터링으로 내 케이스를 확인하고, 우리 병원의 정당한 수익을 지키세요.</p>
    </header>

    <main class="content-wrapper">
      <div id="question-card" class="card">
        <div class="progress-indicator">
          <span id="step-counter">시작</span>
        </div>
        <h2 id="question-text" class="question-text">불러오는 중...</h2>
        <div id="additional-info" class="additional-info"></div>
        <div id="options-container" class="options-container">
          <!-- Options or Date Input injected via JS -->
        </div>
      </div>

      <div class="controls-container">
        <button id="btn-back" class="btn-text hidden" onclick="goBack()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <path d="M12 19l-7-7 7-7" />
          </svg>
          이전으로
        </button>
        <button id="btn-reset" class="btn-text hidden" onclick="resetApp()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
          </svg>
          처음부터 다시하기
        </button>
      </div>
    </main>

    <footer class="app-footer fade-in">
      <p>최종 결정은 의료진의 임상적 판단과 건강보험심사평가원 지침을 따르십시오.</p>
    </footer>
  </div>

  <!-- Checklist Modal -->
  <div id="checklist-modal" class="modal hidden">
    <div class="modal-content card">
      <div class="modal-header">
        <h3>선택 항목 확인</h3>
        <button class="btn-close" onclick="closeChecklist()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div id="checklist-container" class="checklist-container">
        <!-- Checklist items injected via JS -->
      </div>
      <div class="modal-footer">
        <button class="btn-option primary-btn" onclick="closeChecklist()">확인</button>
      </div>
    </div>
  </div>

  <a href="https://instagram.com/insight_rn" target="_blank" class="floating-contact-btn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
      <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
      <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
    </svg>
    문의하기
  </a>

  <script src="script.js"></script>
</body>

</html>
